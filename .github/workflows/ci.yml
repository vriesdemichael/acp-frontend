name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fast-checks:
    name: Fast Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

  checkpoint:
    name: Checkpoint
    needs: fast-checks
    runs-on: ubuntu-latest
    steps:
      - name: Fast checks passed
        run: echo "All fast checks passed — proceeding to slow checks"

  slow-checks:
    name: Slow Checks
    needs: checkpoint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build:frontend

      - name: Build backend
        run: pnpm build:backend

      # Tests: added once the test framework is decided (ADR-006)

      # Coverage upload — wired up alongside test framework setup (ADR-006).
      # Requires CODECOV_TOKEN secret (Settings → Secrets → Actions).
      # Obtain token from https://codecov.io after linking the repository.
      # Minimum PR patch coverage: 85% (enforced via Codecov PR comment/check).
      #
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v5
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     fail_ci_if_error: true

  ci-complete:
    name: CI Complete
    needs: slow-checks
    runs-on: ubuntu-latest
    steps:
      - name: CI passed
        run: echo "CI complete"
