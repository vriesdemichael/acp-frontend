name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fast-checks:
    name: Fast Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Unit and integration tests
        run: pnpm test

  checkpoint:
    name: Checkpoint
    needs: fast-checks
    runs-on: ubuntu-latest
    steps:
      - name: Fast checks passed
        run: echo "All fast checks passed — proceeding to slow checks"

  slow-checks:
    name: Slow Checks
    needs: checkpoint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build:frontend

      - name: Build backend
        run: pnpm build:backend

      - name: Build Storybook
        run: pnpm build:storybook

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Playwright component tests
        run: pnpm test:ct

      - name: Playwright Storybook smoke tests
        run: pnpm test:e2e

      - name: Upload coverage to Codecov
        if: hashFiles('coverage/**') != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  ci-complete:
    name: CI Complete
    needs: slow-checks
    runs-on: ubuntu-latest
    steps:
      - name: CI passed
        run: echo "CI complete"
